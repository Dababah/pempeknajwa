<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Pempek Najwa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1,h2,.serif { font-family: 'Playfair Display', serif; }
        body { background: #000; }
        .glass { backdrop-filter: blur(30px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .btn-gold { background: linear-gradient(135deg, #c5a059, #a6843e); color:#000; font-weight:700; transition:all .3s; }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 15px 40px rgba(197,160,89,0.4); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .float { animation: float 4s ease-in-out infinite; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white; transition: all .3s; }
        .input-field:focus { border-color: rgba(197,160,89,0.5); box-shadow: 0 0 0 3px rgba(197,160,89,0.1); outline: none; }
        .input-field::placeholder { color: rgba(255,255,255,0.25); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background Particles/Decorations -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-[#c5a059]/8 rounded-full blur-[150px]"></div>
        <div class="absolute -bottom-60 -right-40 w-[600px] h-[600px] bg-[#c5a059]/5 rounded-full blur-[180px]"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-[#c5a059]/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Grid pattern overlay -->
    <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px); background-size: 50px 50px;"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        <!-- Logo -->
        <div class="text-center mb-10 float">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#c5a059] to-[#6b4f1e] flex items-center justify-center mx-auto mb-4 shadow-[0_0_40px_rgba(197,160,89,0.4)]">
                <i class="fa-solid fa-fire text-black text-3xl"></i>
            </div>
            <h1 class="serif text-3xl font-bold text-[#c5a059] tracking-widest">PEMPEK NAJWA</h1>
            <p class="text-white/30 text-xs tracking-[0.4em] uppercase mt-2">Management Portal</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-3xl p-10">
            <h2 class="serif text-2xl font-bold text-white mb-1">Selamat Datang</h2>
            <p class="text-white/40 text-sm mb-8">Silakan login untuk mengakses dashboard admin.</p>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold block mb-2">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
                        <input type="text" id="username" required placeholder="Admin" class="input-field w-full rounded-xl py-3.5 pl-11 pr-4 text-sm">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold block mb-2">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
                        <input type="password" id="password" required placeholder="••••••••" class="input-field w-full rounded-xl py-3.5 pl-11 pr-12 text-sm">
                        <button type="button" id="togglePass" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/60 transition-colors">
                            <i class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div id="loginError" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 text-red-400 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Username atau password salah!</span>
                </div>

                <button type="submit" id="loginBtn" class="btn-gold w-full py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-sm tracking-wide mt-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <a href="../index.html" class="text-white/25 hover:text-white/60 text-xs transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left text-[10px]"></i> Kembali ke Halaman Utama
                </a>
            </div>
        </div>

        <p class="text-center text-white/15 text-xs mt-6">Pempek Najwa © 2024 · All Rights Reserved</p>
    </div>

    <script>
        // Show/hide password
        document.getElementById('togglePass').addEventListener('click', function() {
            const pass = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pass.type === 'password') {
                pass.type = 'text';
                icon.className = 'fa-solid fa-eye-slash text-sm';
            } else {
                pass.type = 'password';
                icon.className = 'fa-solid fa-eye text-sm';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...';
            btn.disabled = true;
            errorEl.classList.add('hidden');

            setTimeout(() => {
                if (user === 'Admin' && pass === 'Najwa123') {
                    sessionStorage.setItem('isAdmin', 'true');
                    sessionStorage.setItem('adminName', 'Najwa Admin');
                    localStorage.setItem('najwa_session', 'true');
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Berhasil! Mengalihkan...';
                    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
                    btn.disabled = false;
                    errorEl.classList.remove('hidden');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 900);
        });

        // Auto redirect if already logged in
        if (sessionStorage.getItem('isAdmin') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
