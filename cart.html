<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Pesanan | Pempek Najwa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1,h2,h3,.serif { font-family: 'Playfair Display', serif; }
        body { background: #0a0a0a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #c5a059; border-radius:10px; }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .glass-strong { backdrop-filter: blur(30px); background: rgba(255,255,255,0.06); border: 1px solid rgba(197,160,89,0.2); }
        .btn-gold { background: linear-gradient(135deg, #c5a059, #a6843e); color:#000; font-weight:700; transition:all .3s; }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(197,160,89,0.4); }
        .cart-item { transition: all 0.3s ease; }
        .cart-item:hover { border-color:rgba(197,160,89,0.3); background:rgba(197,160,89,0.05); }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#c5a059] to-[#a6843e] flex items-center justify-center">
                    <i class="fa-solid fa-fire text-black text-xs"></i>
                </div>
                <span class="text-lg font-bold tracking-widest serif text-[#c5a059]">PEMPEK NAJWA</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-white/50 hover:text-white text-sm transition-colors">Home</a>
                <a href="menu.html" class="text-white/50 hover:text-white text-sm transition-colors">Menu</a>
                <a href="cart.html" class="text-[#c5a059] text-sm font-medium">Keranjang</a>
                <a href="admin/login.html" class="btn-gold px-5 py-2 rounded-xl text-xs flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-xs"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-28 pb-32">
        <div class="mb-10">
            <p class="text-[#c5a059] tracking-[0.4em] text-xs uppercase font-bold mb-3">× Keranjang Pesanan ×</p>
            <h1 class="serif text-5xl font-bold">Ringkasan <span class="italic text-[#c5a059]">Pesanan</span></h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Cart Items -->
            <div class="lg:col-span-2">
                <div id="cartItems" class="space-y-5"></div>
                <!-- Empty state -->
                <div id="emptyCart" class="hidden text-center py-28 glass rounded-3xl">
                    <i class="fa-solid fa-cart-shopping text-6xl text-white/10 mb-6 block"></i>
                    <h3 class="serif text-2xl font-bold text-white/40 mb-4">Keranjang Masih Kosong</h3>
                    <p class="text-white/30 text-sm mb-8">Tambahkan menu favorit Anda terlebih dahulu.</p>
                    <a href="menu.html" class="btn-gold px-8 py-3 rounded-xl inline-flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-utensils"></i> Lihat Menu
                    </a>
                </div>
            </div>

            <!-- Summary Panel -->
            <div id="summaryPanel">
                <div class="glass-strong rounded-3xl p-8 sticky top-24">
                    <h3 class="serif text-xl font-bold mb-8">Detail Pembayaran</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-sm text-white/50">
                            <span>Subtotal</span>
                            <span id="subtotal">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-sm text-white/50">
                            <span>Pajak & Layanan (10%)</span>
                            <span id="tax">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-sm text-white/50">
                            <span>Ongkos Kirim</span>
                            <span class="text-green-400">Gratis</span>
                        </div>
                        <div class="border-t border-white/10 pt-4 flex justify-between font-bold text-lg">
                            <span class="serif">Total</span>
                            <span id="total" class="text-[#c5a059]">Rp 0</span>
                        </div>
                    </div>

                    <form id="checkoutForm" class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold block mb-2">Nama Lengkap</label>
                            <input type="text" id="custName" required placeholder="Nama penerima..." class="w-full glass rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 focus:outline-none focus:ring-1 focus:ring-[#c5a059]/50 bg-transparent">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold block mb-2">No. WhatsApp</label>
                            <input type="tel" id="custPhone" required placeholder="08xxxxxxxxxx" class="w-full glass rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 focus:outline-none focus:ring-1 focus:ring-[#c5a059]/50 bg-transparent">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold block mb-2">Alamat Pengiriman</label>
                            <textarea id="custAddress" required rows="3" placeholder="Masukkan alamat lengkap..." class="w-full glass rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 focus:outline-none focus:ring-1 focus:ring-[#c5a059]/50 bg-transparent resize-none"></textarea>
                        </div>
                        <button type="submit" id="waBtn" class="w-full btn-gold py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-sm tracking-wide">
                            <i class="fa-brands fa-whatsapp text-xl"></i> Konfirmasi via WhatsApp
                        </button>
                    </form>
                    
                    <button onclick="clearCart()" class="w-full mt-4 glass py-3 rounded-2xl text-white/30 text-xs hover:text-red-400 hover:border-red-500/30 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> Kosongkan Keranjang
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 glass border-t border-white/10 md:hidden">
        <div class="flex justify-around py-3 px-4">
            <a href="index.html" class="flex flex-col items-center gap-1 text-white/50"><i class="fa-solid fa-house text-lg"></i><span class="text-[10px]">Home</span></a>
            <a href="menu.html" class="flex flex-col items-center gap-1 text-white/50"><i class="fa-solid fa-utensils text-lg"></i><span class="text-[10px]">Menu</span></a>
            <a href="cart.html" class="flex flex-col items-center gap-1 text-[#c5a059]"><i class="fa-solid fa-receipt text-lg"></i><span class="text-[10px]">Keranjang</span></a>
            <a href="admin/login.html" class="flex flex-col items-center gap-1 text-white/50"><i class="fa-solid fa-user-shield text-lg"></i><span class="text-[10px]">Admin</span></a>
        </div>
    </nav>

    <script>
        const formatRupiah = (n) => new Intl.NumberFormat('id-ID', {style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);

        const getCart = () => JSON.parse(localStorage.getItem('najwa_cart')) || [];
        const saveCart = (cart) => localStorage.setItem('najwa_cart', JSON.stringify(cart));

        const updateQty = (id, delta) => {
            let cart = getCart();
            const idx = cart.findIndex(i => i.id == id);
            if (idx === -1) return;
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            saveCart(cart);
            renderCart();
        };

        const updateNote = (id, note) => {
            let cart = getCart();
            const idx = cart.findIndex(i => i.id == id);
            if (idx === -1) return;
            cart[idx].note = note;
            saveCart(cart);
        };

        const deleteItem = (id) => {
            let cart = getCart().filter(i => i.id != id);
            saveCart(cart);
            renderCart();
        };

        window.clearCart = () => {
            Swal.fire({
                title: 'Kosongkan Keranjang?',
                text: 'Semua item akan dihapus dari keranjang.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#c5a059',
                confirmButtonText: 'Ya, Kosongkan',
                cancelButtonText: 'Batal',
                background: '#111', color: '#fff'
            }).then(r => { if(r.isConfirmed) { saveCart([]); renderCart(); }});
        };

        const renderCart = () => {
            const cart = getCart();
            const container = document.getElementById('cartItems');
            const emptyEl = document.getElementById('emptyCart');
            const summaryPanel = document.getElementById('summaryPanel');

            if (cart.length === 0) {
                container.innerHTML = '';
                emptyEl.classList.remove('hidden');
                summaryPanel.classList.add('opacity-40', 'pointer-events-none');
                document.getElementById('subtotal').textContent = 'Rp 0';
                document.getElementById('tax').textContent = 'Rp 0';
                document.getElementById('total').textContent = 'Rp 0';
                return;
            }

            emptyEl.classList.add('hidden');
            summaryPanel.classList.remove('opacity-40', 'pointer-events-none');

            container.innerHTML = cart.map(item => `
                <div class="glass cart-item rounded-3xl p-5 flex flex-col gap-4 group">
                    <div class="flex items-center gap-5">
                        <img src="${item.image}" alt="${item.name}" class="w-20 h-20 rounded-2xl object-cover flex-shrink-0 transition-all group-hover:brightness-110" onerror="this.src='https://placehold.co/100x100/1a1a1a/c5a059?text=P'">
                        <div class="flex-1 min-w-0">
                            <h4 class="serif font-bold text-base mb-1 leading-snug truncate">${item.name}</h4>
                            <p class="text-[#c5a059] font-bold text-sm mb-2">${formatRupiah(item.price)}</p>
                            <div class="flex items-center gap-3">
                                <div class="flex items-center glass rounded-xl overflow-hidden">
                                    <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 transition-colors text-white font-bold">−</button>
                                    <span class="w-6 text-center text-xs font-bold">${item.qty}</span>
                                    <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 transition-colors text-white font-bold">+</button>
                                </div>
                                <button onclick="deleteItem(${item.id})" class="text-white/20 hover:text-red-400 transition-colors p-2">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <p class="font-bold text-lg">${formatRupiah(item.price * item.qty)}</p>
                        </div>
                    </div>
                    <div class="border-t border-white/5 pt-3">
                        <div class="relative">
                            <i class="fa-solid fa-pen-to-square absolute left-3 top-3 text-white/20 text-xs"></i>
                            <input type="text" 
                                placeholder="Tambah catatan (cth: gak pake cuka, cuka dipisah...)" 
                                oninput="updateNote(${item.id}, this.value)" 
                                value="${item.note || ''}"
                                class="w-full glass rounded-xl py-2.5 pl-9 pr-4 text-xs text-white placeholder-white/20 focus:outline-none focus:ring-1 focus:ring-[#c5a059]/30 bg-transparent">
                        </div>
                    </div>
                </div>
            `).join('');

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = formatRupiah(subtotal);
            document.getElementById('tax').textContent = formatRupiah(tax);
            document.getElementById('total').textContent = formatRupiah(total);
        };

        document.getElementById('checkoutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const cart = getCart();
            if (cart.length === 0) return;

            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            let msg = `*🍽️ INVOICE DIGITAL - PEMPEK NAJWA*\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `📅 *Tanggal:* ${new Date().toLocaleDateString('id-ID', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}\n`;
            msg += `👤 *Nama:* ${name}\n`;
            msg += `📞 *WhatsApp:* ${phone}\n`;
            msg += `📍 *Alamat:* ${address}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `*📦 DETAIL PESANAN:*\n\n`;
            cart.forEach((item, i) => {
                msg += `${i+1}. *${item.name}*\n`;
                msg += `   • Qty: ${item.qty} pcs\n`;
                if (item.note) msg += `   • 📝 Note: _${item.note}_\n`;
                msg += `   • Subtotal: ${formatRupiah(item.price * item.qty)}\n\n`;
            });
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `💰 *Subtotal:* ${formatRupiah(subtotal)}\n`;
            msg += `🏷️ *Pajak (10%):* ${formatRupiah(tax)}\n`;
            msg += `🚚 *Ongkir:* GRATIS\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `*💎 TOTAL BAYAR: ${formatRupiah(total)}*\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `_Terima kasih telah memesan di Pempek Najwa! 🙏_`;

            const waNum = '628123456789';
            window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`, '_blank');
        });

        document.addEventListener('DOMContentLoaded', renderCart);
        window.addEventListener('storage', renderCart);
    </script>
</body>
</html>
